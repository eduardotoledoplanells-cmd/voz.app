name: 🔄 Keep-Alive VOZ — Ping Frecuente

on:
  # 4 workflows escalonados para cubrir cada ~15 minutos reales
  # (GitHub Actions puede retrasar cada uno, pero juntos garantizan cobertura)
  schedule:
    - cron: '0,15,30,45 * * * *'   # En punto, :15, :30, :45 de cada hora
  workflow_dispatch:

jobs:
  keepalive:
    name: Ping VOZ Servers
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: 📡 Ping Vercel + Supabase
        id: ping
        run: |
          echo "⏰ $(date -u '+%Y-%m-%dT%H:%M:%SZ') — Keep-alive iniciado"

          # Reintento con backoff
          for attempt in 1 2 3; do
            HTTP=$(curl -s -o /tmp/body.json -w "%{http_code}" \
              --max-time 25 \
              -H "Cache-Control: no-cache" \
              -H "User-Agent: VOZ-GHA-KeepAlive/2.0" \
              https://server-taupe-six.vercel.app/api/health) || HTTP="000"

            echo "Intento $attempt — HTTP: $HTTP"

            if [ "$HTTP" -eq 200 ]; then
              echo "✅ OK"
              cat /tmp/body.json
              break
            else
              echo "⚠️  HTTP $HTTP, esperando 10s..."
              sleep 10
            fi
          done

      - name: 🗄️ Ping Supabase directo (sin pasar por Vercel)
        run: |
          # Proyecto producción: thiftwzubmvcrdhuwcwm (creado 2026-05-18)
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoaWZ0d3p1Ym12Y3JkaHV3Y3dtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMTIxNzIsImV4cCI6MjA5NDY4ODE3Mn0.ontxCxwCCA4TRbFCF9oZHT-eSDTrVC2b5P6z5B6Xa6s"

          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            -H "apikey: $ANON_KEY" \
            -H "Authorization: Bearer $ANON_KEY" \
            "https://thiftwzubmvcrdhuwcwm.supabase.co/rest/v1/app_users?select=id&limit=1")

          echo "Supabase REST HTTP: $HTTP"
          if [ "$HTTP" -eq 200 ] || [ "$HTTP" -eq 206 ]; then
            echo "✅ Supabase activo"
          else
            echo "ℹ️  Supabase respondió $HTTP"
          fi

      - name: 📊 Resumen
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "🔗 https://server-taupe-six.vercel.app"
          echo "🗄️  https://thiftwzubmvcrdhuwcwm.supabase.co"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
