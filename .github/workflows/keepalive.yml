name: 🔄 Keep-Alive VOZ Servers

on:
  schedule:
    # Cada 10 minutos (mínimo permitido por GitHub Actions)
    - cron: '*/10 * * * *'
  # Ejecución manual desde GitHub UI → Actions → Run workflow
  workflow_dispatch:

jobs:
  keepalive:
    name: Ping VOZ Servers
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      # ─────────────────────────────────────────────────────────────────────
      # 1. Vercel — servidor principal (thiftwzubmvcrdhuwcwm, más reciente)
      # ─────────────────────────────────────────────────────────────────────
      - name: 📡 Ping Vercel + Supabase (producción)
        id: ping_vercel
        run: |
          echo "⏰ $(date -u '+%Y-%m-%dT%H:%M:%SZ') — Keep-alive iniciado"

          HTTP=$(curl -s -o /tmp/body.json -w "%{http_code}" \
            --max-time 25 \
            --retry 3 \
            --retry-delay 5 \
            --retry-connrefused \
            -H "Cache-Control: no-cache" \
            -H "User-Agent: VOZ-GHA-KeepAlive/1.0" \
            https://server-taupe-six.vercel.app/api/health)

          echo "HTTP Status: $HTTP"

          if [ -f /tmp/body.json ]; then
            cat /tmp/body.json
            echo ""
          fi

          if [ "$HTTP" -eq 200 ]; then
            echo "✅ Vercel OK — Supabase (producción) activo"
          else
            echo "⚠️  Vercel respondió HTTP $HTTP — puede estar en cold start"
            # No falla el job — un cold start de Vercel es normal y el ping ya lo resuelve
          fi

      # ─────────────────────────────────────────────────────────────────────
      # 2. Ping directo a la API de Supabase producción (sin pasar por Vercel)
      #    Garantiza que la BD no se pause incluso si Vercel tiene problemas
      # ─────────────────────────────────────────────────────────────────────
      - name: 🗄️  Ping Supabase REST (proyecto producción)
        run: |
          # Proyecto: thiftwzubmvcrdhuwcwm (creado 2026-05-18, el más reciente)
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            --retry 2 \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://thiftwzubmvcrdhuwcwm.supabase.co/rest/v1/app_users?select=id&limit=1")

          echo "Supabase REST HTTP: $HTTP"

          if [ "$HTTP" -eq 200 ] || [ "$HTTP" -eq 206 ]; then
            echo "✅ Supabase (producción) respondiendo correctamente"
          else
            echo "ℹ️  Supabase HTTP $HTTP — puede necesitar configuración de anon key en secrets"
          fi

      # ─────────────────────────────────────────────────────────────────────
      # 3. Resumen final
      # ─────────────────────────────────────────────────────────────────────
      - name: 📊 Resumen
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Keep-alive completado: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "🎯 Próxima ejecución automática: en ~10 minutos"
          echo "🔗 Vercel:   https://server-taupe-six.vercel.app"
          echo "🗄️  Supabase: https://thiftwzubmvcrdhuwcwm.supabase.co"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
