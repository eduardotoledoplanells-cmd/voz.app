name: 🔄 Keep-Alive VOZ — Turno B (offset +5min)

on:
  schedule:
    # Offset de 5 minutos respecto al workflow A (0,15,30,45)
    # Juntos cubren: :00,:05,:15,:20,:30,:35,:45,:50 → cada ~5-7min real
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:

jobs:
  keepalive-b:
    name: Ping VOZ (B)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: 📡 Ping Vercel
        run: |
          HTTP=$(curl -s -o /tmp/body.json -w "%{http_code}" \
            --max-time 25 --retry 2 --retry-delay 8 \
            -H "Cache-Control: no-cache" \
            -H "User-Agent: VOZ-GHA-KeepAlive-B/2.0" \
            https://server-taupe-six.vercel.app/api/health) || HTTP="000"

          echo "$(date -u '+%H:%M:%SZ') — HTTP: $HTTP"
          [ -f /tmp/body.json ] && cat /tmp/body.json || true

      - name: 🗄️ Ping Supabase directo
        run: |
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoaWZ0d3p1Ym12Y3JkaHV3Y3dtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMTIxNzIsImV4cCI6MjA5NDY4ODE3Mn0.ontxCxwCCA4TRbFCF9oZHT-eSDTrVC2b5P6z5B6Xa6s"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            -H "apikey: $ANON_KEY" -H "Authorization: Bearer $ANON_KEY" \
            "https://thiftwzubmvcrdhuwcwm.supabase.co/rest/v1/app_users?select=id&limit=1")
          echo "Supabase: $HTTP"
